# Cloudflare named (persistent) tunnel config for saltbot's web UI.
#
# One-time setup (requires a Cloudflare account + a domain on Cloudflare):
#   1. cloudflared tunnel login                       # browser auth -> ~/.cloudflared/cert.pem
#   2. cloudflared tunnel create saltbot              # -> ~/.cloudflared/<UUID>.json credentials
#   3. cloudflared tunnel route dns saltbot bot.example.com
#   4. cp src/config/template-cloudflared.yml src/config/cloudflared.yml
#   5. Fill in the values below (tunnel UUID/name, credentials-file, hostname).
#
# src/config/cloudflared.yml is gitignored (like config.json5) — keep secrets there.
# After that, `npm start` launches this tunnel alongside Bot and Web automatically.

# Tunnel name (or UUID) from `cloudflared tunnel create`.
tunnel: saltbot
# Absolute path to the credentials JSON created by `cloudflared tunnel create`.
credentials-file: /home/<user>/.cloudflared/<uuid>.json

ingress:
  # Public hostname -> the local web server (PORT in package.json "start:web", default 3000).
  - hostname: bot.example.com
    service: http://localhost:3000
  # Required catch-all rule.
  - service: http_status:404
